name: Mise a jour du README

on:
  schedule:
    - cron: "0 8,12,16,21 * * *" # tous les jours a 8h, 12h, 16h et 21h UTC
  push:
    branches: ["main"]
  workflow_dispatch:       # declenchement manuel possible

jobs:
  update:
    name: Fetch & update README
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install requests

      - name: Mettre a jour les articles
        env:
          BLOG_SYNC_TOKEN: ${{ secrets.BLOG_SYNC_TOKEN }}
        run: python update_blog.py

      - name: Mettre a jour les projets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python update_repos.py

      - name: Commit si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/repo_summaries.json
          git diff --cached --quiet || git commit -m "chore: mise a jour du README"
          git push
